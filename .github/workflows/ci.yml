name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Keep this workflow narrow:
# - install the package
# - run the repo-local pytest suite (the morph-bench cross-repo contract test
#   skips cleanly when gnosis-morph-bench is not installed)
# - no HF asset fetches
# - no external API calls
# - no mutation of tracked artefacts
# - no monorepo source needed
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: run pytest
        run: pytest -q

      - name: assert tracked artefacts unchanged
        run: |
          git status --short
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::pytest mutated tracked files; see git status above"
            exit 1
          fi
